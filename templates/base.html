<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Library Management System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#212529;
            position:fixed;
            left:0;
            top:0;
            padding-top:20px;
        }

        .sidebar h3{
            color:white;
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 25px;
            transition:.3s;
        }

        .sidebar a:hover{
            background:#0d6efd;
        }

        .content{
            margin-left:250px;
            padding:30px;
        }

        .topbar{
            background:white;
            padding:15px 25px;
            border-radius:10px;
            margin-bottom:25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }
    </style>

</head>
<body>

<div class="sidebar">

    <h3>📚 Library</h3>

    <a href="/">🏠 Dashboard</a>
    <a href="/books">📚 Books</a>
    <a href="/students">👨‍🎓 Students</a>
    <a href="/issue_book">📖 Issue Book</a>
    <a href="/issued_books">📋 Issued Books</a>
    <a href="/logout">🚪 Logout</a>

</div>

<div class="content">

    <div class="topbar">

        <h4>Library Management System</h4>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
