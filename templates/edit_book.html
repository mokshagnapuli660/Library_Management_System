<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Edit Book</h2>

    <form action="/update_book/{{ book[0] }}" method="POST">

        <div class="mb-3">
            <label>Book Title</label>
            <input type="text" name="title" class="form-control" value="{{ book[1] }}">
        </div>

        <div class="mb-3">
            <label>Author</label>
            <input type="text" name="author" class="form-control" value="{{ book[2] }}">
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" name="category" class="form-control" value="{{ book[3] }}">
        </div>

        <button class="btn btn-primary">
            Update Book
        </button>

    </form>

</div>

</body>
</html>
